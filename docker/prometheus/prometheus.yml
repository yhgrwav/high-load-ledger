global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: ledger-gateway
    dns_sd_configs:
      - names: ['gateway']
        type: A
        port: 6767

  - job_name: ledger-posting-worker
    static_configs:
      - targets: ['posting-worker:6767']

  - job_name: loadgen
    static_configs:
      - targets: ['loadgen:9092']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: nginx
    static_configs:
      - targets: ['nginx-exporter:9113']
