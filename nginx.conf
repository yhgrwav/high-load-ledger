resolver 127.0.0.11 valid=10s ipv6=off;



server {
    listen 80;
    http2 on;

    server_name localhost;

    access_log /dev/stdout;
    error_log /dev/stderr notice;

    grpc_read_timeout 5s;
    grpc_send_timeout 5s;

    location /stub_status {
        stub_status;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;
    }

    location / {
        set $grpc_backend gateway:50051;
        grpc_pass grpc://$grpc_backend;

        error_page 502 = /grpc_errors;
    }

    location = /grpc_errors {
        grpc_set_header grpc-status 2;
        grpc_set_header grpc-message "Internal Server Error / Upstream unavailable";
        return 204;
    }
}
