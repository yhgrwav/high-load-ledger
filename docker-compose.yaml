services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ledger_gateway
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      DB_NAME: ${DB_NAME}
      DB_SUPER_USER: ${DB_SUPER_USER}
      DB_SUPER_PASSWORD: ${DB_SUPER_PASSWORD}
      METRICS_PORT: ${METRICS_PORT}
      GRPC_PORT: ${GRPC_PORT}
    ports:
      - "50051:50051"
      - "6767:6767"  
    networks:
      - ledger_network
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: ledger_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_SUPER_USER}
      POSTGRES_PASSWORD: ${DB_SUPER_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ledger_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SUPER_USER} -d ${DB_NAME}"]
      interval: 2s
      timeout: 5s
      retries: 10

  ledger-app-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./migrations:/migrations
    networks:
      - ledger_network
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -path=/migrations/
      - -database=postgres://${DB_SUPER_USER}:${DB_SUPER_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      - up

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: ledger_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "19090:9090"
    networks:
      - ledger_network

  grafana:
    image: grafana/grafana:11.5.2
    container_name: ledger_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_HTTP_PORT: 3000
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    networks:
      - ledger_network

  redis:
    image: redis:7-alpine
    container_name: ledger_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - ledger_network

volumes:
  postgres_data:
  grafana_data:

networks:
  ledger_network:
    driver: bridge
