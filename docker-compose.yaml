services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      DB_NAME: ${DB_NAME}
      DB_SUPER_USER: ${DB_SUPER_USER}
      DB_SUPER_PASSWORD: ${DB_SUPER_PASSWORD}
      METRICS_PORT: ${METRICS_PORT}
      GRPC_PORT: ${GRPC_PORT}
    expose:
      - "50051"
      - "6767"
    networks:
      - ledger_network
    depends_on:
      postgres:
        condition: service_healthy

  posting-worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_NAME: ${DB_NAME}
      DB_SUPER_USER: ${DB_SUPER_USER}
      DB_SUPER_PASSWORD: ${DB_SUPER_PASSWORD}
      POSTING_WORKER_NAME: ${POSTING_WORKER_NAME}
      POSTING_WORKER_BATCH_SIZE: ${POSTING_WORKER_BATCH_SIZE}
      POSTING_WORKER_BACKOFF: ${POSTING_WORKER_BACKOFF}
      METRICS_PORT: ${METRICS_PORT}
      SERVICE_NAME: ledger-posting-worker
    expose:
      - "6767"
    networks:
      - ledger_network
    depends_on:
      postgres:
        condition: service_healthy
      ledger-app-migrate:
        condition: service_completed_successfully

  nginx:
    image: nginx:1.25-alpine
    container_name: ledger_nginx
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ledger_network
    depends_on:
      - gateway

  postgres:
    image: postgres:16-alpine
    container_name: ledger_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_SUPER_USER}
      POSTGRES_PASSWORD: ${DB_SUPER_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ledger_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SUPER_USER} -d ${DB_NAME}"]
      interval: 2s
      timeout: 5s
      retries: 10

  ledger-app-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./migrations:/migrations
    networks:
      - ledger_network
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -path=/migrations/
      - -database=postgres://${DB_SUPER_USER}:${DB_SUPER_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      - up

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: ledger_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "19090:9090"
    networks:
      - ledger_network

  grafana:
    image: grafana/grafana:11.5.2
    container_name: ledger_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_HTTP_PORT: 3000
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    networks:
      - ledger_network

  redis:
    image: redis:7-alpine
    container_name: ledger_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - ledger_network

  loadgen:
    build:
      context: .
      dockerfile: docker/loadgen/Dockerfile
    restart: "no"
    environment:
      LOAD_GEN_WORKING: ${LOAD_GEN_WORKING}
      USERS_AMOUNT: ${USERS_AMOUNT}
      VALID_RPS: ${VALID_RPS}
      INVALID_RPS: ${INVALID_RPS}
      INVALID_CURRENCY_RPS: ${INVALID_CURRENCY_RPS}
      LOAD_DURATION: ${LOAD_DURATION}
      LOAD_BOOTSTRAP_WORKERS: ${LOAD_BOOTSTRAP_WORKERS}
      LOAD_TX_WORKERS: ${LOAD_TX_WORKERS}
      BOOTSTRAP_MAX_ERROR_PCT: ${BOOTSTRAP_MAX_ERROR_PCT}
      LOADGEN_GRPC_ADDR: nginx:80
      LOADGEN_METRICS_PORT: ${LOADGEN_METRICS_PORT}
    expose:
      - "9092"
    networks:
      - ledger_network
    depends_on:
      nginx:
        condition: service_started
      gateway:
        condition: service_started
      ledger-app-migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  grafana_data:

networks:
  ledger_network:
    driver: bridge
